<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShowBible</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f6f5f1; color: #191a1d; }
    header { display: flex; gap: 16px; align-items: center; justify-content: space-between; padding: 12px 18px; background: #20242b; color: white; }
    main { display: grid; grid-template-columns: 220px minmax(0, 1fr) 280px; min-height: calc(100vh - 52px); }
    aside, section { padding: 16px; border-right: 1px solid #d8d6ce; }
    aside:last-child { border-right: 0; border-left: 1px solid #d8d6ce; }
    h1, h2 { margin: 0 0 12px; font-size: 18px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0; color: #555b64; }
    button { border: 1px solid #20242b; background: #20242b; color: white; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
    textarea { box-sizing: border-box; width: 100%; min-height: 90px; resize: vertical; border: 1px solid #b9b5aa; border-radius: 6px; padding: 8px; font: inherit; }
    pre { white-space: pre-wrap; background: white; border: 1px solid #d8d6ce; border-radius: 8px; padding: 14px; min-height: 70vh; overflow: auto; }
    .cast { display: grid; gap: 8px; }
    .person { padding: 8px; background: white; border: 1px solid #d8d6ce; border-radius: 6px; }
    .stack { display: grid; gap: 10px; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } aside, section, aside:last-child { border: 0; border-bottom: 1px solid #d8d6ce; } pre { min-height: 40vh; } }
  </style>
</head>
<body>
  <header>
    <h1>ShowBible</h1>
    <span id="summary">loading...</span>
  </header>
  <main>
    <aside>
      <h2>Cast</h2>
      <div id="cast" class="cast"></div>
    </aside>
    <section>
      <h2>Transcript</h2>
      <pre id="transcript"></pre>
    </section>
    <aside>
      <h2>Intervene</h2>
      <div class="stack">
        <textarea id="note" placeholder="Drop a production note"></textarea>
        <button id="send">Send Note</button>
      </div>
      <h2 style="margin-top: 24px;">Context</h2>
      <pre id="context"></pre>
    </aside>
  </main>
  <script>
    async function refresh() {
      const status = await fetch('/api/status').then(r => r.json());
      const episode = status.episodes[0]?.episode || 'S01E01';
      const transcript = await fetch(`/api/transcript?episode=${encodeURIComponent(episode)}`).then(r => r.json());
      document.getElementById('summary').textContent = `${status.vault} · ${status.episodes.length} episode(s)`;
      document.getElementById('cast').innerHTML = status.cast.map(p => `<div class="person">${p.display_name}<br><small>${p.slug}</small></div>`).join('');
      document.getElementById('transcript').textContent = transcript.transcript || 'No transcript yet.';
      document.getElementById('context').textContent = JSON.stringify({ episode, cost: status.cost, findings: status.findings }, null, 2);
    }
    document.getElementById('send').addEventListener('click', async () => {
      const content = document.getElementById('note').value.trim();
      if (!content) return;
      await fetch('/api/intervene', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ type: 'note', content }) });
      document.getElementById('note').value = '';
      await refresh();
    });
    refresh();
    setInterval(refresh, 4000);
  </script>
</body>
</html>
